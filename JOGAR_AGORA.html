<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>O Guardião do Porão - TESTE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap');

        :root {
            --bg-dark: #0a0a0c;
            --accent-red: #8b0000;
            --accent-gold: #d4af37;
        }

        body {
            margin: 0;
            overflow: hidden;
            background: #000;
            color: white;
            font-family: 'Outfit', sans-serif;
        }

        canvas {
            display: block;
        }

        /* UI */
        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            padding: 20px;
        }

        #inventory {
            display: flex;
            gap: 10px;
            pointer-events: all;
        }

        .slot {
            width: 60px;
            height: 60px;
            background: rgba(20, 20, 30, 0.8);
            border: 2px solid #333;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
        }

        .slot.active {
            border-color: var(--accent-gold);
            box-shadow: 0 0 10px var(--accent-gold);
        }

        #hud {
            position: absolute;
            bottom: 20px;
            left: 20px;
        }

        #health-bg {
            width: 200px;
            height: 10px;
            background: #222;
            border-radius: 5px;
        }

        #health-val {
            width: 100%;
            height: 100%;
            background: var(--accent-red);
            border-radius: 5px;
            transition: 0.3s;
        }

        #weapon-name {
            margin-top: 5px;
            font-weight: 600;
            color: var(--accent-gold);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Legenda */
        #dialog {
            position: absolute;
            bottom: 15%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            padding: 15px 30px;
            border-radius: 50px;
            display: none;
            text-align: center;
            border: 1px solid var(--accent-gold);
            max-width: 80%;
        }

        #dialog.show {
            display: block;
            animation: fIn 3s forwards;
        }

        @keyframes fIn {

            0%,
            100% {
                opacity: 0;
            }

            10%,
            90% {
                opacity: 1;
            }
        }

        /* Controles */
        #instructions {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px;
            border-radius: 5px;
            font-size: 14px;
            text-align: right;
        }
    </style>
</head>

<body>
    <div id="ui">
        <div id="inventory">
            <div class="slot" id="s1"></div>
            <div class="slot" id="s2"></div>
            <div class="slot" id="s3"></div>
        </div>
        <div id="hud">
            <div id="health-bg">
                <div id="health-val"></div>
            </div>
            <div id="weapon-name">Mãos Vazias</div>
        </div>
        <div id="dialog"></div>
        <div id="instructions">WASD: Mover | 1, 2, 3: Armas | ESPAÇO: Atacar</div>
    </div>

    <!-- Motores via CDN -->
    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>
    <script type="module">
        import * as THREE from 'three';

        // --- CENA ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050508);
        scene.fog = new THREE.Fog(0x050508, 5, 35);

        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const ambient = new THREE.AmbientLight(0x404040, 0.5);
        scene.add(ambient);

        // --- JOGADOR ---
        const player = {
            mesh: new THREE.Mesh(new THREE.PlaneGeometry(1, 2), new THREE.MeshStandardMaterial({ color: 0xffffff, side: THREE.DoubleSide })),
            speed: 0.18,
            inv: [],
            current: -1,
            hp: 100
        };
        player.mesh.position.y = 1;
        scene.add(player.mesh);

        const torch = new THREE.PointLight(0xffaa22, 20, 15);
        scene.add(torch);

        // --- MUNDO ---
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(20, 200), new THREE.MeshStandardMaterial({ color: 0x111111 }));
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        // Alavancas (SALA 1)
        const levers = [];
        let seq = [];
        for (let i = 0; i < 3; i++) {
            const l = new THREE.Mesh(new THREE.BoxGeometry(0.5, 1, 0.2), new THREE.MeshStandardMaterial({ color: 0xff0000 }));
            l.position.set(-3 + i * 3, 0.5, -15);
            l.userData = { id: i };
            scene.add(l);
            levers.push(l);
        }

        // Cristais (SALA 2)
        const crystals = [];
        const cols = [0xff0000, 0x00ff00, 0x0000ff];
        for (let i = 0; i < 3; i++) {
            const c = new THREE.Mesh(new THREE.OctahedronGeometry(0.5), new THREE.MeshStandardMaterial({ color: cols[i], emissive: cols[i] }));
            c.position.set(-3 + i * 3, 1, -35);
            c.userData = { id: i };
            scene.add(c);
            crystals.push(c);
        }

        // Labirinto (SALA 3)
        const orbs = [];
        for (let i = 0; i < 3; i++) {
            const o = new THREE.Mesh(new THREE.SphereGeometry(0.4), new THREE.MeshStandardMaterial({ color: 0xffff00 }));
            o.position.set(Math.random() * 6 - 3, 1, -55 - i * 5);
            scene.add(o);
            orbs.push(o);
        }

        // CÉRBERO (SALA 4)
        const boss = new THREE.Group();
        const body = new THREE.Mesh(new THREE.BoxGeometry(4, 3, 5), new THREE.MeshStandardMaterial({ color: 0x440000 }));
        boss.add(body);
        const heads = [];
        const hCols = [0xff4444, 0x44ff44, 0x4444ff]; // Vermelha, Verde, Azul
        for (let i = 0; i < 3; i++) {
            const h = new THREE.Mesh(new THREE.SphereGeometry(1), new THREE.MeshStandardMaterial({ color: hCols[i] }));
            h.position.set(-1.5 + i * 1.5, 2.5, 3);
            h.userData = { hp: 100, id: i };
            boss.add(h);
            heads.push(h);
        }
        boss.position.set(0, 1.5, -90);
        scene.add(boss);

        // --- LÓGICA ---
        const keys = {};
        window.addEventListener('keydown', e => {
            keys[e.key.toLowerCase()] = true;
            if (e.key === '1' && player.inv[0]) selectW(0);
            if (e.key === '2' && player.inv[1]) selectW(1);
            if (e.key === '3' && player.inv[2]) selectW(2);
            if (e.key === ' ') attack();
        });
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

        function msg(txt) {
            const d = document.getElementById('dialog');
            d.innerText = txt;
            d.classList.remove('show');
            void d.offsetWidth; // Reset animation
            d.classList.add('show');
        }

        function selectW(i) {
            player.current = i;
            document.getElementById('weapon-name').innerText = player.inv[i];
            document.querySelectorAll('.slot').forEach((s, idx) => {
                s.classList.toggle('active', idx === i);
            });
        }

        function attack() {
            if (player.current === -1) return;
            heads.forEach(h => {
                const dist = player.mesh.position.distanceTo(boss.position.clone().add(h.position));
                if (dist < 8) {
                    if (h.userData.hp <= 0) return;
                    // Lógica de Fraqueza
                    let canHit = false;
                    if (h.userData.id === 0 && player.inv[player.current] === "Faca Curta") canHit = true;
                    if (h.userData.id === 1 && player.inv[player.current] === "Pistola Velha") canHit = true;
                    if (h.userData.id === 2 && player.inv[player.current] === "Cetro Rúnico") canHit = true;

                    if (canHit) {
                        h.userData.hp -= 20;
                        h.scale.multiplyScalar(0.9);
                        msg("ACERTOU UMA CABEÇA!");
                        if (h.userData.hp <= 0) h.visible = false;
                    } else {
                        msg("ESTA ARMA NÃO FAZ NADA NESSA CABEÇA!");
                    }
                }
            });
            if (heads.every(h => h.userData.hp <= 0)) {
                msg("VOCÊ DERROTOU O GUARDIAO! FIM DE JOGO.");
                setTimeout(() => location.reload(), 5000);
            }
        }

        let stage = 1;
        function update() {
            if (keys.w) player.mesh.position.z -= player.speed;
            if (keys.s) player.mesh.position.z += player.speed;
            if (keys.a) player.mesh.position.x -= player.speed;
            if (keys.d) player.mesh.position.x += player.speed;

            player.mesh.position.x = Math.max(-8, Math.min(8, player.mesh.position.x));

            camera.position.lerp(new THREE.Vector3(player.mesh.position.x, 6, player.mesh.position.z + 10), 0.1);
            camera.lookAt(player.mesh.position);
            torch.position.copy(player.mesh.position).add(new THREE.Vector3(0, 1, 1));
            player.mesh.rotation.y = Math.atan2(camera.position.x - player.mesh.position.x, camera.position.z - player.mesh.position.z);

            // Interações Sala 1 (Alavancas)
            levers.forEach(l => {
                if (player.mesh.position.distanceTo(l.position) < 1.5 && l.material.color.getHex() === 0xff0000) {
                    l.material.color.set(0x00ff00);
                    seq.push(l.userData.id);
                    if (seq.length === 3) {
                        if (JSON.stringify(seq) === "[1,2,0]") {
                            msg("SALA 1 COMPLETA! PEGOU A FACA CURTA.");
                            player.inv.push("Faca Curta");
                            document.getElementById('s1').innerText = "🗡️";
                            selectW(0);
                        } else {
                            msg("ERROU. RESETANDO ALAVANCAS.");
                            seq = [];
                            levers.forEach(lev => lev.material.color.set(0xff0000));
                        }
                    }
                }
            });

            // Interações Sala 2 (Cristais)
            crystals.forEach(c => {
                if (player.mesh.position.distanceTo(c.position) < 1.5 && !player.inv.includes("Pistola Velha")) {
                    if (c.userData.id === player.inv.length - 1) { // Lógica simples de progressão
                        msg("SALA 2 COMPLETA! PEGOU A PISTOLA.");
                        player.inv.push("Pistola Velha");
                        document.getElementById('s2').innerText = "🔫";
                    }
                }
            });

            // Interações Sala 3 (Orbes)
            orbs.forEach(o => {
                if (player.mesh.position.distanceTo(o.position) < 1.5 && o.visible) {
                    o.visible = false;
                    if (orbs.every(orb => !orb.visible)) {
                        msg("SALA 3 COMPLETA! PEGOU O CETRO RÚNICO.");
                        player.inv.push("Cetro Rúnico");
                        document.getElementById('s3').innerText = "🔮";
                    }
                }
            });

            // Movimento do Cérbero
            if (player.mesh.position.z < -70) {
                boss.position.x = Math.sin(Date.now() * 0.002) * 5;
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            update();
            renderer.render(scene, camera);
        }
        animate();
        msg("O PORÃO TE AGUARDA. ENCONTRE A SAÍDA.");
    </script>
</body>

</html>
