<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O Guardião do Porão - JOGAR AGORA</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap');

        :root {
            --bg-dark: #0a0a0c;
            --accent-red: #8b0000;
            --accent-gold: #d4af37;
            --glass-bg: rgba(20, 20, 25, 0.85);
            --border-color: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            overflow: hidden;
            color: white;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            box-shadow: inset 0 0 200px rgba(0, 0, 0, 1);
        }

        #game-container::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, transparent 20%, rgba(0, 0, 0, 0.8) 100%);
            pointer-events: none;
            z-index: 5;
        }

        #bg {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        #ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 2rem;
        }

        #inventory {
            display: flex;
            gap: 1rem;
            pointer-events: all;
        }

        .slot {
            width: 64px;
            height: 64px;
            background: var(--glass-bg);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .slot.active {
            border-color: var(--accent-gold);
            box-shadow: 0 0 15px var(--accent-gold);
            animation: pulse 2s infinite;
        }

        #status-bar {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            width: 300px;
        }

        #health-bar-container {
            width: 100%;
            height: 8px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 4px;
            border: 1px solid var(--border-color);
            overflow: hidden;
        }

        #health-bar {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #ff4d4d, var(--accent-red));
            transition: width 0.3s ease;
        }

        #weapon-name {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent-gold);
            font-weight: 900;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
        }

        #interaction-prompt {
            position: absolute;
            top: 60%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 0.8rem 1.5rem;
            border-radius: 30px;
            border: 1px solid var(--accent-gold);
            font-weight: 600;
            opacity: 0;
            transition: all 0.3s ease;
        }

        #interaction-prompt.visible {
            opacity: 1;
            transform: translate(-50%, -60%);
        }

        #dialog-box {
            position: absolute;
            bottom: 15%;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            max-width: 600px;
            background: var(--glass-bg);
            border: 1px solid var(--accent-gold);
            padding: 1.5rem;
            border-radius: 16px;
            backdrop-filter: blur(20px);
            pointer-events: all;
            display: none;
        }

        #dialog-box.visible {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        #loading-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-dark);
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 1s ease;
        }

        .loader {
            width: 50px;
            height: 50px;
            border: 3px solid transparent;
            border-top-color: var(--accent-gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translate(-50%, 20px);
            }

            to {
                opacity: 1;
                transform: translate(-50%, 0);
            }
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 5px var(--accent-gold);
            }

            50% {
                box-shadow: 0 0 20px var(--accent-gold);
            }

            100% {
                box-shadow: 0 0 5px var(--accent-gold);
            }
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>

<body>
    <div id="game-container">
        <canvas id="bg"></canvas>
        <div id="ui-overlay">
            <div id="inventory">
                <div class="slot" id="slot-1"></div>
                <div class="slot" id="slot-2"></div>
                <div class="slot" id="slot-3"></div>
            </div>
            <div id="dialog-box">
                <p id="dialog-text"></p>
                <button id="close-dialog"
                    style="background:var(--accent-gold); border:none; padding:0.5rem 1rem; cursor:pointer; font-weight:900;">CONTINUAR</button>
            </div>
            <div id="status-bar">
                <div id="health-bar-container">
                    <div id="health-bar"></div>
                </div>
                <div id="weapon-name">Mãos Vazias</div>
            </div>
            <div id="interaction-prompt">Pressione [E] para interagir</div>
        </div>
        <div id="loading-screen">
            <h1>O Guardião do Porão</h1>
            <div class="loader"></div>
            <p>Entrando nas profundezas...</p>
        </div>
    </div>

    <script
        type="importmap">{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }</script>
    <script type="module">
        import * as THREE from 'three';
        const scene = new THREE.Scene(); scene.background = new THREE.Color(0x050505); scene.fog = new THREE.Fog(0x050505, 5, 25);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: document.querySelector('#bg'), antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio); renderer.setSize(window.innerWidth, window.innerHeight);

        const loader = new THREE.TextureLoader();
        const assets = './public/assets/';
        const loadT = (n) => loader.load(assets + n, undefined, undefined, () => console.warn('Falha asset: ' + n));
        const floorT = loadT('floor.png'); const wallT = loadT('wall.png'); const heroT = loadT('hero.png');
        floorT.wrapS = floorT.wrapT = THREE.RepeatWrapping; floorT.repeat.set(10, 10);
        wallT.wrapS = wallT.wrapT = THREE.RepeatWrapping; wallT.repeat.set(4, 1);

        const ambient = new THREE.AmbientLight(0x404040, 0.3); scene.add(ambient);
        const torch = new THREE.PointLight(0xffaa00, 20, 15); torch.castShadow = true; scene.add(torch);

        const player = { mesh: null, speed: 0.1, inv: [], weapon: null };
        const keys = { w: false, a: false, s: false, d: false, e: false };

        function init() {
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(50, 50), new THREE.MeshStandardMaterial({ map: floorT, color: 0x222222 }));
            floor.rotation.x = -Math.PI / 2; scene.add(floor);
            const wallM = new THREE.MeshStandardMaterial({ map: wallT, color: 0x444444 });
            const wN = new THREE.Mesh(new THREE.BoxGeometry(20, 10, 1), wallM); wN.position.set(0, 5, -10); scene.add(wN);
            const wS = new THREE.Mesh(new THREE.BoxGeometry(20, 10, 1), wallM); wS.position.set(0, 5, 15); scene.add(wS);
            const wW = new THREE.Mesh(new THREE.BoxGeometry(1, 10, 26), wallM); wW.position.set(-10, 5, 2.5); scene.add(wW);
            const wE = new THREE.Mesh(new THREE.BoxGeometry(1, 10, 26), wallM); wE.position.set(10, 5, 2.5); scene.add(wE);

            const pHero = new THREE.Mesh(new THREE.PlaneGeometry(2, 3), new THREE.MeshStandardMaterial({ map: heroT, transparent: true, alphaTest: 0.5 }));
            pHero.position.y = 1.5; player.mesh = pHero; scene.add(pHero);

            createLevers();
            animate();
        }

        const levers = []; let seq = []; const correct = [0, 2, 1];
        function createLevers() {
            [-4, 0, 4].forEach((x, i) => {
                const g = new THREE.Group();
                const b = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.2, 0.4), new THREE.MeshStandardMaterial({ color: 0x333333 }));
                const h = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 1), new THREE.MeshStandardMaterial({ color: 0x555555 }));
                h.position.y = 0.5; h.rotation.z = Math.PI / 4;
                g.add(b); g.add(h); g.position.set(x, 1.5, -9);
                g.userData = { id: i, active: false, h: h };
                scene.add(g); levers.push(g);
            });
        }

        window.addEventListener('keydown', (e) => { if (keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = true; });
        window.addEventListener('keyup', (e) => { if (keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = false; });
        document.getElementById('close-dialog').onclick = () => document.getElementById('dialog-box').classList.remove('visible');

        function animate() {
            requestAnimationFrame(animate);
            const prev = player.mesh.position.clone();
            if (keys.w) player.mesh.position.z -= player.speed; if (keys.s) player.mesh.position.z += player.speed;
            if (keys.a) player.mesh.position.x -= player.speed; if (keys.d) player.mesh.position.x += player.speed;
            if (Math.abs(player.mesh.position.x) > 9) player.mesh.position.x = prev.x;
            if (player.mesh.position.z < -8.5 || player.mesh.position.z > 14) player.mesh.position.z = prev.z;

            camera.position.lerp(new THREE.Vector3(player.mesh.position.x, 6, player.mesh.position.z + 10), 0.1);
            camera.lookAt(player.mesh.position.x, 1.5, player.mesh.position.z);
            torch.position.set(player.mesh.position.x, 2, player.mesh.position.z + 1);
            player.mesh.rotation.y = Math.atan2(camera.position.x - player.mesh.position.x, camera.position.z - player.mesh.position.z);

            let near = false;
            levers.forEach(l => {
                if (player.mesh.position.distanceTo(l.position) < 2) {
                    near = true; document.getElementById('interaction-prompt').classList.add('visible');
                    if (keys.e && !l.userData.active) {
                        l.userData.active = true; l.userData.h.rotation.z = -Math.PI / 4;
                        seq.push(l.userData.id);
                        if (seq.length === 3) {
                            if (JSON.stringify(seq) === JSON.stringify(correct)) {
                                document.getElementById('dialog-text').innerText = "Sequência Correta! Você encontrou a Faca Curta.";
                                document.getElementById('dialog-box').classList.add('visible');
                                document.getElementById('slot-1').classList.add('active');
                                document.getElementById('slot-1').innerHTML = "🗡️";
                            } else {
                                document.getElementById('dialog-text').innerText = "Errado. As alavancas resetaram.";
                                document.getElementById('dialog-box').classList.add('visible');
                                setTimeout(() => { seq = []; levers.forEach(lv => { lv.userData.active = false; lv.userData.h.rotation.z = Math.PI / 4; }); }, 1000);
                            }
                        }
                        keys.e = false;
                    }
                }
            });
            if (!near) document.getElementById('interaction-prompt').classList.remove('visible');
            renderer.render(scene, camera);
        }

        window.onload = () => { setTimeout(() => { document.getElementById('loading-screen').style.opacity = '0'; setTimeout(() => document.getElementById('loading-screen').classList.add('hidden'), 1000); }, 1000); init(); };
        window.onresize = () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); };
    </script>
</body>

</html>
