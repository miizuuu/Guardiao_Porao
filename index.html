<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="O Guardião do Porão - Aventura Épica 2.5D">
    <title>O Guardião do Porão</title>
    <link rel="stylesheet" href="./style.css">
    <script type="importmap">
        {
          "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
          }
        }
    </script>
</head>

<body>
    <div id="game-container">
        <canvas id="bg"></canvas>

        <!-- UI Overlay -->
        <div id="ui-overlay">
            <div id="inventory">
                <div class="slot" id="slot-1" title="Faca Curta"></div>
                <div class="slot" id="slot-2" title="Pistola Velha"></div>
                <div class="slot" id="slot-3" title="Cetro Rúnico"></div>
            </div>

            <div id="dialog-box" class="hidden">
                <p id="dialog-text"></p>
                <button id="close-dialog">Entendido</button>
            </div>

            <div id="status-bar">
                <div id="health-bar-container">
                    <div id="health-bar"></div>
                </div>
                <div id="weapon-info">
                    <div id="weapon-name">Mãos Vazias</div>
                </div>
            </div>

            <div id="interaction-prompt" class="hidden">Pressione [E] para interagir</div>
        </div>

        <div id="loading-screen">
            <h1>O Guardião</h1>
            <div class="loader-container">
                <div class="loader-bar"></div>
            </div>
            <p style="margin-top: 20px; letter-spacing: 2px;">CARREGANDO AS PROFUNDEZAS...</p>
        </div>
    </div>
    <script type="module" src="./main.js"></script>
</body>

</html>
