<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O Guardião do Porão - Edição Definitiva</title>
    <link rel="stylesheet" href="./style.css">
    <script type="importmap">
        {
          "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
          }
        }
    </script>
</head>

<body>
    <div id="game-container">
        <canvas id="bg"></canvas>

        <div id="ui-layer">
            <div id="top-bar">
                <div id="inventory-slots">
                    <div class="slot" id="slot-1" data-label="🗡️"></div>
                    <div class="slot" id="slot-2" data-label="🔫"></div>
                    <div class="slot" id="slot-3" data-label="🔮"></div>
                </div>
                <div id="weapon-display">MÃOS VAZIAS</div>
            </div>

            <div id="interaction-label" class="hidden">PRESSIONE [E]</div>

            <div id="msg-box" class="hidden">
                <p id="msg-text"></p>
                <small>Clique para fechar</small>
            </div>

            <div id="health-hud">
                <div id="hp-bar-fill"></div>
            </div>
        </div>

        <div id="loader">
            <h1>O GUARDIÃO</h1>
            <div class="progress">
                <div id="progress-fill"></div>
            </div>
            <p>CONSTRUINDO O MUNDO...</p>
        </div>
    </div>
    <script type="module" src="./main.js"></script>
</body>

</html>
