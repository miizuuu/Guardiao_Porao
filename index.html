<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O Guardião do Porão - Crônicas do Alçapão</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap');

        :root {
            --accent: #d4af37;
            --bg: #0a0a0c;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg);
            overflow: hidden;
            color: white;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        #bg {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* UI */
        #ui {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
            padding: 30px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        #inventory {
            display: flex;
            gap: 10px;
            pointer-events: all;
        }

        .slot {
            width: 60px;
            height: 60px;
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid #333;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            transition: 0.3s;
        }

        .slot.active {
            border-color: var(--accent);
            box-shadow: 0 0 15px var(--accent);
            transform: scale(1.1);
        }

        #mission-log {
            background: rgba(0, 0, 0, 0.6);
            padding: 15px;
            border-radius: 10px;
            border-left: 4px solid var(--accent);
            max-width: 250px;
            pointer-events: all;
        }

        #mission-log h3 {
            font-size: 14px;
            text-transform: uppercase;
            color: var(--accent);
        }

        #mission-log p {
            font-size: 13px;
            opacity: 0.9;
            margin-top: 5px;
        }

        #dialog {
            position: absolute;
            bottom: 15%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 15px 40px;
            border-radius: 50px;
            border: 1px solid var(--accent);
            text-align: center;
            display: none;
            z-index: 20;
        }

        #dialog.show {
            display: block;
            animation: fInOut 3s forwards;
        }

        #fade-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            background: black;
            z-index: 50;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.8s;
        }

        @keyframes fInOut {

            0%,
            100% {
                opacity: 0;
                transform: translate(-50%, 20px);
            }

            10%,
            90% {
                opacity: 1;
                transform: translate(-50%, 0);
            }
        }

        #loading {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
    <script
        type="importmap"> { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } } </script>
</head>

<body>
    <div id="game-container">
        <div id="fade-overlay"></div>
        <canvas id="bg"></canvas>
        <div id="ui">
            <div style="display: flex; justify-content: space-between;">
                <div id="inventory">
                    <div class="slot" id="s1"></div>
                    <div class="slot" id="s2"></div>
                    <div class="slot" id="s3"></div>
                </div>
                <div id="mission-log">
                    <h3>Missão Ativa</h3>
                    <p id="goal-text">Encontre itens no porão para abrir as salas trancadas.</p>
                </div>
            </div>
            <div id="dialog"></div>
            <div style="font-size: 12px; opacity: 0.6; text-align: right;">[WASD] Mover | [ESPAÇO] Interagir / Atacar
            </div>
        </div>
        <div id="loading">
            <h1>Carregando Porão...</h1>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';

        // --- SETUP INICIAL ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('bg'), antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);

        const ambLight = new THREE.AmbientLight(0xffffff, 0.9);
        scene.add(ambLight);

        // --- ESTADO GLOBAL ---
        const state = {
            currentScene: 'HUB', // 'HUB', 'ROOM1', 'ROOM2', 'ROOM3', 'ARENA'
            items: [],
            weapons: [],
            currentWpn: -1,
            targetCamPos: new THREE.Vector3(0, 15, 15),
            targetLookAt: new THREE.Vector3(0, 0, 0),
            transitioning: false
        };

        const player = {
            mesh: new THREE.Mesh(new THREE.BoxGeometry(1, 2, 0.3), new THREE.MeshStandardMaterial({ color: 0x55ccff })),
            pos: new THREE.Vector3(0, 1, 0),
            speed: 0.2
        };
        scene.add(player.mesh);

        // --- GERENCIADOR DE CENAS ---
        const interactables = [];
        function clearScene() {
            const toRemove = [];
            scene.traverse(child => {
                if (child.userData.dynamic) toRemove.push(child);
            });
            toRemove.forEach(obj => scene.remove(obj));
            interactables.length = 0;
        }

        async function transitionTo(sceneName) {
            if (state.transitioning) return;
            state.transitioning = true;
            const fade = document.getElementById('fade-overlay');
            fade.style.opacity = '1';

            await new Promise(r => setTimeout(r, 800));

            clearScene();
            state.currentScene = sceneName;

            if (sceneName === 'HUB') loadHub();
            else if (sceneName.startsWith('ROOM')) loadRoom(sceneName.replace('ROOM', ''));
            else if (sceneName === 'ARENA') loadArena();

            fade.style.opacity = '0';
            state.transitioning = false;
        }

        // --- CENÁRIOS ---
        function loadHub() {
            // Chão
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(50, 50), new THREE.MeshStandardMaterial({ color: 0x333333 }));
            floor.rotation.x = -Math.PI / 2; floor.userData.dynamic = true; scene.add(floor);

            // Alçapão
            const tp = new THREE.Mesh(new THREE.BoxGeometry(5, 0.3, 5), new THREE.MeshStandardMaterial({ color: 0x111111 }));
            tp.position.set(0, 0, 0); tp.userData = { dynamic: true, type: 'trapdoor' };
            scene.add(tp); interactables.push(tp);

            // Portas
            createGate(-15, 0, 'Alavanca', 'ROOM1', 0xaa55ff);
            createGate(15, 0, 'Código', 'ROOM2', 0x55ffaa);
            createGate(0, -15, 'Manopla', 'ROOM3', 0xffaa55);

            // Itens
            createItem(8, 8, 'Alavanca de Ferro', 0xff0000);
            createItem(-8, 5, 'Código Antigo', 0x00ff00);
            createItem(4, -10, 'Manopla Rúnica', 0x0000ff);

            player.pos.set(0, 1, 5);
            updateLog("Hub Central: Encontre os itens espalhados para abrir as salas.");
        }

        function loadRoom(id) {
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(30, 30), new THREE.MeshStandardMaterial({ color: 0x221144 }));
            floor.rotation.x = -Math.PI / 2; floor.userData.dynamic = true; scene.add(floor);

            const prize = new THREE.Mesh(new THREE.TorusKnotGeometry(1, 0.4), new THREE.MeshStandardMaterial({ color: 0xd4af37, emissive: 0x554400 }));
            prize.position.set(0, 2, -5); prize.userData = { dynamic: true, type: 'weapon', id: id };
            scene.add(prize); interactables.push(prize);

            const exit = new THREE.Mesh(new THREE.BoxGeometry(3, 4, 1), new THREE.MeshStandardMaterial({ color: 0x333333 }));
            exit.position.set(0, 2, 12); exit.userData = { dynamic: true, type: 'exit' };
            scene.add(exit); interactables.push(exit);

            player.pos.set(0, 1, 10);
            updateLog(`Sala ${id}: Pegue a relíquia no centro.`);
        }

        let boss;
        const heads = [];
        function loadArena() {
            const floor = new THREE.Mesh(new THREE.CircleGeometry(25, 32), new THREE.MeshStandardMaterial({ color: 0x1a0a0a }));
            floor.rotation.x = -Math.PI / 2; floor.userData.dynamic = true; scene.add(floor);

            boss = new THREE.Group();
            boss.userData.dynamic = true;
            const body = new THREE.Mesh(new THREE.BoxGeometry(6, 4, 8), new THREE.MeshStandardMaterial({ color: 0x440000 }));
            boss.add(body);
            const colors = [0xff0000, 0x00ff00, 0x0000ff];
            for (let i = 0; i < 3; i++) {
                const h = new THREE.Mesh(new THREE.SphereGeometry(1.5), new THREE.MeshStandardMaterial({ color: colors[i] }));
                h.position.set(-2.5 + i * 2.5, 3.5, 4.5);
                h.userData = { hp: 100, id: i };
                boss.add(h); heads.push(h);
            }
            boss.position.set(0, 2, -10);
            scene.add(boss);

            player.pos.set(0, 1, 15);
            updateLog("Arena Final: Use 1, 2, 3 para trocar de arma e ESPAÇO para atacar!");
        }

        // --- HELPERS ---
        function createGate(x, z, req, target, col) {
            const g = new THREE.Mesh(new THREE.BoxGeometry(4, 6, 1), new THREE.MeshStandardMaterial({ color: col, transparent: true, opacity: 0.8 }));
            g.position.set(x, 3, z);
            if (x !== 0) g.rotation.y = Math.PI / 2;
            g.userData = { dynamic: true, type: 'gate', req: req, target: target };
            scene.add(g); interactables.push(g);
        }

        function createItem(x, z, name, col) {
            const i = new THREE.Mesh(new THREE.IcosahedronGeometry(0.5), new THREE.MeshStandardMaterial({ color: col, emissive: col }));
            i.position.set(x, 1, z);
            i.userData = { dynamic: true, type: 'item', name: name };
            scene.add(i); interactables.push(i);
        }

        function msg(t) {
            const d = document.getElementById('dialog');
            d.innerText = t; d.classList.remove('show'); void d.offsetWidth; d.classList.add('show');
        }

        function updateLog(t) { document.getElementById('goal-text').innerText = t; }

        // --- SISTEMA DE CÂMERA E MOVIMENTO ---
        const keys = {};
        window.addEventListener('keydown', e => {
            keys[e.key.toLowerCase()] = true;
            if (e.key === ' ') interact();
            if (['1', '2', '3'].includes(e.key)) selectWeapon(parseInt(e.key) - 1);
        });
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

        function interact() {
            interactables.forEach(obj => {
                if (player.mesh.position.distanceTo(obj.position) < 4) {
                    if (obj.userData.type === 'item') {
                        state.items.push(obj.userData.name.split(' ')[0]); // Pega só a primeira palavra
                        msg("Coletado: " + obj.userData.name);
                        obj.visible = false;
                    }
                    else if (obj.userData.type === 'gate') {
                        if (state.items.includes(obj.userData.req)) transitionTo(obj.userData.target);
                        else msg("Bloqueado! Precisa de: " + obj.userData.req);
                    }
                    else if (obj.userData.type === 'weapon') {
                        const wpns = ["Faca Curta", "Pistola Velha", "Cetro Rúnico"];
                        const icons = ["🗡️", "🔫", "🔮"];
                        const id = parseInt(obj.userData.id) - 1;
                        if (!state.weapons.includes(wpns[id])) {
                            state.weapons.push(wpns[id]);
                            document.getElementById('s' + (id + 1)).innerText = icons[id];
                            msg("Arma Obtida: " + wpns[id]);
                            obj.visible = false;
                        }
                    }
                    else if (obj.userData.type === 'exit') transitionTo('HUB');
                    else if (obj.userData.type === 'trapdoor') {
                        if (state.weapons.length === 3) transitionTo('ARENA');
                        else msg("O alçapão requer as 3 relíquias!");
                    }
                }
            });

            if (state.currentScene === 'ARENA') attackBoss();
        }

        function attackBoss() {
            if (state.currentWpn === -1) return;
            heads.forEach(h => {
                const worldPos = new THREE.Vector3(); h.getWorldPosition(worldPos);
                if (player.mesh.position.distanceTo(worldPos) < 10 && h.userData.hp > 0) {
                    const w = state.weapons[state.currentWpn];
                    let hit = false;
                    if (h.userData.id === 0 && w.includes("Faca")) hit = true;
                    if (h.userData.id === 1 && w.includes("Pistola")) hit = true;
                    if (h.userData.id === 2 && w.includes("Cetro")) hit = true;
                    if (hit) {
                        h.userData.hp -= 34; h.scale.multiplyScalar(0.8); msg("ACERTO!");
                        if (h.userData.hp <= 0) h.visible = false;
                    } else msg("Use outra arma!");
                }
            });
            if (heads.every(h => !h.visible)) { msg("VICTORY!"); setTimeout(() => location.reload(), 5000); }
        }

        function selectWeapon(i) {
            if (i < state.weapons.length) {
                state.currentWpn = i;
                document.querySelectorAll('.slot').forEach((s, idx) => s.classList.toggle('active', idx === i));
            }
        }

        function update() {
            if (state.transitioning) return;

            // Movimento
            if (keys.w) player.pos.z -= player.speed;
            if (keys.s) player.pos.z += player.speed;
            if (keys.a) player.pos.x -= player.speed;
            if (keys.d) player.pos.x += player.speed;
            player.mesh.position.copy(player.pos);

            // LOGICA DE CÂMERA (FOCO DINÂMICO)
            let focusObj = null;
            interactables.forEach(obj => {
                if (obj.visible && player.mesh.position.distanceTo(obj.position) < 8) focusObj = obj;
            });

            if (focusObj) {
                // Mira entre o jogador e o objeto
                const midPoint = new THREE.Vector3().lerpVectors(player.mesh.position, focusObj.position, 0.5);
                state.targetCamPos.copy(midPoint).add(new THREE.Vector3(0, 10, 8));
                state.targetLookAt.copy(midPoint);
            } else {
                state.targetCamPos.copy(player.mesh.position).add(new THREE.Vector3(0, 14, 12));
                state.targetLookAt.copy(player.mesh.position);
            }

            camera.position.lerp(state.targetCamPos, 0.08);
            camera.lookAt(state.targetLookAt);

            // Animação Boss
            if (state.currentScene === 'ARENA' && boss) boss.position.x = Math.sin(Date.now() * 0.002) * 8;
        }

        function animate() { requestAnimationFrame(animate); update(); renderer.render(scene, camera); }

        loadHub();
        animate();

        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loading').style.opacity = '0';
                setTimeout(() => document.getElementById('loading').style.display = 'none', 1000);
            }, 1000);
        });
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>

</html>
