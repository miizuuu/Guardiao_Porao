<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O Guardião do Porão - Investigação 3D</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="ui-container">
        <div id="crosshair"></div>
        <div id="instructions">
            <h1>O Guardião do Porão</h1>
            <p>Clique para Iniciar</p>
            <p>(WASD para mover, MOUSE para olhar, E para interagir, CLIQUE para atacar)</p>
        </div>
        <div id="controls-hint">
            <h3>Comandos</h3>
            <ul>
                <li>[WASD] Mover</li>
                <li>[MOUSE] Olhar</li>
                <li>[E] Interagir</li>
                <li>[CLICK] Atacar</li>
                <li>[1-3/Scroll] Itens</li>
            </ul>
        </div>
        <div id="inventory">
            <div id="slot-0" class="slot active">🔦</div>
            <div id="slot-1" class="slot">🔑</div>
            <div id="slot-2" class="slot">⚔️</div>
        </div>
        <div id="health-container">
            <div id="health-bar"></div>
        </div>
        <div id="messages"></div>
    </div>

    <!-- Import Map for Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script type="module" src="main.js"></script>
</body>

</html>
