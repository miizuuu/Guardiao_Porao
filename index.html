<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O Guardião do Porão</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap');

        :root {
            --accent: #d4af37;
            --bg: #0a0a0c;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg);
            overflow: hidden;
            color: white;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* UI */
        #ui {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
            padding: 30px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        #inventory {
            display: flex;
            gap: 10px;
            pointer-events: all;
        }

        .slot {
            width: 60px;
            height: 60px;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #333;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            transition: 0.3s;
        }

        .slot.active {
            border-color: var(--accent);
            box-shadow: 0 0 15px var(--accent);
            transform: scale(1.1);
        }

        #mission-log {
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 10px;
            border-left: 4px solid var(--accent);
            max-width: 300px;
        }

        #mission-log h3 {
            font-size: 14px;
            text-transform: uppercase;
            color: var(--accent);
        }

        #mission-log p {
            font-size: 13px;
            opacity: 0.9;
            margin-top: 5px;
        }

        #dialog {
            position: absolute;
            bottom: 15%;
            left: 50%;
            transform: translateX(-50%);
            background: #000;
            padding: 15px 40px;
            border-radius: 50px;
            border: 1px solid var(--accent);
            text-align: center;
            display: none;
            z-index: 20;
            color: #fff;
        }

        #dialog.show {
            display: block;
            animation: fInOut 4s forwards;
        }

        #fade-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            background: black;
            z-index: 50;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.8s;
        }

        @keyframes fInOut {

            0%,
            100% {
                opacity: 0;
                transform: translate(-50%, 20px);
            }

            10%,
            90% {
                opacity: 1;
                transform: translate(-50%, 0);
            }
        }

        #loading {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .loader {
            width: 40px;
            height: 40px;
            border: 3px solid transparent;
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-top: 20px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
    <script
        type="importmap"> { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } } </script>
</head>

<body>
    <div id="game-container">
        <div id="fade-overlay"></div>
        <canvas id="bg"></canvas>
        <div id="ui">
            <div style="display: flex; justify-content: space-between;">
                <div id="inventory">
                    <div class="slot" id="s1"></div>
                    <div class="slot" id="s2"></div>
                    <div class="slot" id="s3"></div>
                </div>
                <div id="mission-log">
                    <h3>Objetivo</h3>
                    <p id="goal-text">Entre em uma das três salas para enfrentar os desafios e obter as armas.</p>
                </div>
            </div>
            <div id="dialog"></div>
            <div style="font-size: 12px; opacity: 0.6; text-align: right;">[WASD] Mover | [ESPAÇO] Interagir / Atacar
            </div>
        </div>
        <div id="loading">
            <h1>O Guardião do Porão</h1>
            <div class="loader"></div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';

        // --- SETUP ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('bg'), antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        scene.add(new THREE.AmbientLight(0xffffff, 1.0)); // Iluminação clara

        const state = {
            scene: 'HUB', weapons: [], currentWpn: -1, transitioning: false,
            p1: { seq: [], correct: [1, 3, 0, 2] },
            p2: { step: 0 },
            bossHeads: [100, 100, 100]
        };

        const player = {
            mesh: new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 2), new THREE.MeshStandardMaterial({ color: 0x55ccff })),
            pos: new THREE.Vector3(0, 1, 0)
        };
        scene.add(player.mesh);

        const interactables = [];

        // --- GERENCIADOR DE FASES ---
        async function loadPhase(p) {
            state.transitioning = true;
            document.getElementById('fade-overlay').style.opacity = '1';
            await new Promise(r => setTimeout(r, 800));

            // Limpa cena anterior
            const toRemove = [];
            scene.traverse(c => { if (c.userData.dynamic) toRemove.push(c); });
            toRemove.forEach(o => scene.remove(o));
            interactables.length = 0;

            state.scene = p;
            if (p === 'HUB') buildHub();
            else if (p === 'SALA1') buildSala1();
            else if (p === 'SALA2') buildSala2();
            else if (p === 'SALA3') buildSala3();
            else if (p === 'ARENA') buildArena();

            document.getElementById('fade-overlay').style.opacity = '0';
            state.transitioning = false;
        }

        function createFloor(w, h, col) {
            const f = new THREE.Mesh(new THREE.PlaneGeometry(w, h), new THREE.MeshStandardMaterial({ color: col }));
            f.rotation.x = -Math.PI / 2; f.userData.dynamic = true; scene.add(f);
        }

        // --- HUB ---
        function buildHub() {
            createFloor(40, 40, 0x222222);
            player.pos.set(0, 1, 10);

            // Portas
            const doors = [
                { x: -15, z: 0, target: 'SALA1', col: 0xff4444, label: 'SALA 1: ALAVANCAS' },
                { x: 15, z: 0, target: 'SALA2', col: 0x44ff44, label: 'SALA 2: SÍMBOLOS' },
                { x: 0, z: -15, target: 'SALA3', col: 0x4444ff, label: 'SALA 3: LUZ' }
            ];
            doors.forEach(d => {
                const g = new THREE.Mesh(new THREE.BoxGeometry(4, 6, 0.5), new THREE.MeshStandardMaterial({ color: d.col }));
                g.position.set(d.x, 3, d.z); if (d.x !== 0) g.rotation.y = Math.PI / 2;
                g.userData = { dynamic: true, type: 'door', target: d.target, msg: d.label };
                scene.add(g); interactables.push(g);
            });

            // Alçapão
            const tp = new THREE.Mesh(new THREE.BoxGeometry(6, 0.2, 6), new THREE.MeshStandardMaterial({ color: 0x111111 }));
            tp.userData = { dynamic: true, type: 'trapdoor' };
            scene.add(tp); interactables.push(tp);

            updateGoal("Explore as salas laterais para obter as 3 armas.");
        }

        // --- SALA 1: PUZZLE ALAVANCAS ---
        function buildSala1() {
            createFloor(20, 30, 0x331111);
            player.pos.set(0, 1, 12);
            for (let i = 0; i < 4; i++) {
                const l = new THREE.Mesh(new THREE.BoxGeometry(0.5, 2, 0.2), new THREE.MeshStandardMaterial({ color: 0xff0000 }));
                l.position.set(-6 + i * 4, 1, -5);
                l.userData = { dynamic: true, type: 'lever', id: i };
                scene.add(l); interactables.push(l);
            }
            createExit();
        }

        // --- SALA 2: PUZZLE SÍMBOLOS ---
        function buildSala2() {
            createFloor(20, 30, 0x113311);
            player.pos.set(0, 1, 12);
            // Símbolos nas paredes (Cubos coloridos) e placas no chão
            for (let i = 0; i < 3; i++) {
                const plate = new THREE.Mesh(new THREE.BoxGeometry(3, 0.1, 3), new THREE.MeshStandardMaterial({ color: 0x555555 }));
                plate.position.set(-5 + i * 5, 0.05, 0);
                plate.userData = { dynamic: true, type: 'plate', id: i };
                scene.add(plate); interactables.push(plate);

                const sign = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 0.5), new THREE.MeshStandardMaterial({ color: [0x00ffff, 0xff00ff, 0xffff00][i] }));
                sign.position.set(-5 + i * 5, 4, -10); sign.userData = { dynamic: true };
                scene.add(sign);
            }
            createExit();
        }

        // --- SALA 3: LABIRINTO LUZ ---
        let lightBeams = [];
        function buildSala3() {
            createFloor(20, 60, 0x111133);
            player.pos.set(0, 1, 25);
            lightBeams = [];
            for (let i = 0; i < 5; i++) {
                const b = new THREE.Mesh(new THREE.BoxGeometry(20, 0.5, 0.5), new THREE.MeshStandardMaterial({ color: 0x00ffff, emissive: 0x00ffff }));
                b.position.set(0, 1, 15 - i * 8);
                b.userData = { dynamic: true, originX: 0 };
                scene.add(b); lightBeams.push(b);
            }
            const prize = new THREE.Mesh(new THREE.SphereGeometry(1), new THREE.MeshStandardMaterial({ color: 0xd4af37 }));
            prize.position.set(0, 1.5, -25); prize.userData = { dynamic: true, type: 'prize', id: 3 };
            scene.add(prize); interactables.push(prize);
            createExit();
        }

        // --- ARENA DO CÉRBERO ---
        let boss;
        const bHeads = [];
        function buildArena() {
            createFloor(40, 40, 0x000000);
            boss = new THREE.Group(); boss.userData.dynamic = true;
            const body = new THREE.Mesh(new THREE.BoxGeometry(6, 4, 8), new THREE.MeshStandardMaterial({ color: 0x440000 }));
            boss.add(body);
            const colors = [0xff0000, 0x00ff00, 0x0000ff];
            for (let i = 0; i < 3; i++) {
                const h = new THREE.Mesh(new THREE.SphereGeometry(1.5), new THREE.MeshStandardMaterial({ color: colors[i] }));
                h.position.set(-2.5 + i * 2.5, 4, 4); h.userData = { id: i, hp: 100 };
                boss.add(h); bHeads.push(h);
            }
            boss.position.set(0, 2, -10); scene.add(boss);
            player.pos.set(0, 1, 15);
            updateGoal("BATALHA FINAL: Derrote as 3 cabeças. Troque as armas com 1, 2, 3.");
        }

        function createExit() {
            const e = new THREE.Mesh(new THREE.BoxGeometry(4, 6, 1), new THREE.MeshStandardMaterial({ color: 0x444444 }));
            e.position.set(0, 3, 14); e.userData = { dynamic: true, type: 'exit' };
            scene.add(e); interactables.push(e);
        }

        // --- LÓGICA DE INTERAÇÃO ---
        function interact() {
            interactables.forEach(obj => {
                if (player.mesh.position.distanceTo(obj.position) < 3.5) {
                    if (obj.userData.type === 'door') transitionToPhase(obj.userData.target);
                    else if (obj.userData.type === 'exit') transitionToPhase('HUB');
                    else if (obj.userData.type === 'lever') solveP1(obj);
                    else if (obj.userData.type === 'plate') solveP2(obj);
                    else if (obj.userData.type === 'prize') getWpn(obj.userData.id);
                    else if (obj.userData.type === 'trapdoor') {
                        if (state.weapons.length === 3) transitionToPhase('ARENA');
                        else msg("O alçapão está trancado. Obtenha as 3 armas!");
                    }
                }
            });
            if (state.scene === 'ARENA') attackBoss();
        }

        function solveP1(l) {
            if (l.material.color.getHex() === 0x00ff00) return;
            l.material.color.set(0x00ff00);
            state.p1.seq.push(l.userData.id);
            if (state.p1.seq.length === 4) {
                if (JSON.stringify(state.p1.seq) === JSON.stringify(state.p1.correct)) {
                    msg("SEQUÊNCIA CORRETA! FACA OBTIDA!"); getWpn(1);
                } else {
                    msg("ERROU! AS ALAVANCAS RESETARAM."); state.p1.seq = [];
                    interactables.filter(o => o.userData.type === 'lever').forEach(o => o.material.color.set(0xff0000));
                }
            }
        }

        function solveP2(p) {
            if (p.userData.id === state.p2.step) {
                p.material.color.set(0x00ffff); state.p2.step++;
                if (state.p2.step === 3) { msg("SÍMBOLOS RECONHECIDOS! PISTOLA OBTIDA!"); getWpn(2); }
            } else {
                msg("SINAL INCORRETO!"); state.p2.step = 0;
                interactables.filter(o => o.userData.type === 'plate').forEach(o => o.material.color.set(0x555555));
            }
        }

        function getWpn(id) {
            const names = ["Faca Curta", "Pistola Velha", "Cetro Rúnico"];
            const icons = ["🗡️", "🔫", "🔮"];
            if (!state.weapons.includes(names[id - 1])) {
                state.weapons.push(names[id - 1]);
                document.getElementById('s' + id).innerText = icons[id - 1];
                msg("Você obteve: " + names[id - 1]);
            }
        }

        function attackBoss() {
            if (state.currentWpn === -1) return;
            bHeads.forEach(h => {
                const wPos = new THREE.Vector3(); h.getWorldPosition(wPos);
                if (player.mesh.position.distanceTo(wPos) < 10 && h.visible) {
                    const w = state.weapons[state.currentWpn];
                    let hit = (h.userData.id === 0 && w.includes("Faca")) || (h.userData.id === 1 && w.includes("Pistola")) || (h.userData.id === 2 && w.includes("Cetro"));
                    if (hit) { h.userData.hp -= 34; h.scale.multiplyScalar(0.85); msg("DANO!"); if (h.userData.hp <= 0) h.visible = false; }
                    else msg("ARMA ERRADA!");
                }
            });
            if (bHeads.every(h => !h.visible)) { msg("VITÓRIA! O CÉRBERO CAIU!"); setTimeout(() => location.reload(), 6000); }
        }

        // --- LOOP PRINCIPAL ---
        function update() {
            if (state.transitioning) return;

            // Movimento simples
            if (keys.w) player.pos.z -= 0.2; if (keys.s) player.pos.z += 0.2;
            if (keys.a) player.pos.x -= 0.2; if (keys.d) player.pos.x += 0.2;
            player.mesh.position.copy(player.pos);

            // Câmera clássica direta
            camera.position.lerp(new THREE.Vector3(player.pos.x, 15, player.pos.z + 12), 0.1);
            camera.lookAt(player.pos);

            // Sala 3: Obstáculos de Luz
            if (state.scene === 'SALA3') {
                lightBeams.forEach((b, i) => {
                    b.position.x = Math.sin(Date.now() * 0.002 + i) * 10;
                    if (player.mesh.position.distanceTo(b.position) < 2) {
                        msg("A LUZ TE EXPULSOU!"); player.pos.set(0, 1, 25);
                    }
                });
            }
            if (state.scene === 'ARENA' && boss) boss.position.x = Math.sin(Date.now() * 0.002) * 10;
        }

        function animate() { requestAnimationFrame(animate); update(); renderer.render(scene, camera); }
        function msg(t) { const d = document.getElementById('dialog'); d.innerText = t; d.classList.remove('show'); void d.offsetWidth; d.classList.add('show'); }
        function updateGoal(t) { document.getElementById('goal-text').innerText = t; }
        function transitionToPhase(p) { loadPhase(p); }
        function selectWeapon(i) { if (i < state.weapons.length) { state.currentWpn = i; document.querySelectorAll('.slot').forEach((s, idx) => s.classList.toggle('active', idx === i)); } }

        window.addEventListener('keydown', e => {
            keys[e.key.toLowerCase()] = true;
            if (e.key === ' ') interact();
            if (['1', '2', '3'].includes(e.key)) selectWeapon(parseInt(e.key) - 1);
        });
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
        window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });

        loadPhase('HUB');
        animate();
        setTimeout(() => { document.getElementById('loading').style.opacity = '0'; setTimeout(() => document.getElementById('loading').style.display = 'none', 1000); }, 1500);
    </script>
</body>

</html>
