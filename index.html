<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O Guardião do Porão</title>
    <link rel="stylesheet" href="./style.css">
    <!-- Import Map para Three.js funcionar direto no navegador/GitHub Pages -->
    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>
</head>

<body>
    <div id="game-container">
        <canvas id="bg"></canvas>

        <div id="ui-overlay">
            <div id="inventory">
                <div class="slot" id="slot-1"></div>
                <div class="slot" id="slot-2"></div>
                <div class="slot" id="slot-3"></div>
            </div>

            <div id="dialog-box" class="hidden">
                <p id="dialog-text"></p>
            </div>

            <div id="status-bar">
                <div id="health-bar-container">
                    <div id="health-bar"></div>
                </div>
                <div id="weapon-display">
                    <span id="weapon-icon"></span>
                    <span id="weapon-name">Mãos Vazias</span>
                </div>
            </div>

            <div id="controls-hint">
                [WASD] Mover | [1,2,3] Armas | [ESPAÇO] Atacar
            </div>
        </div>

        <div id="loading-screen">
            <h1>O Guardião do Porão</h1>
            <div class="loader"></div>
            <p>Entrando nas profundezas...</p>
        </div>
    </div>
    <script type="module" src="./main.js"></script>
</body>

</html>
